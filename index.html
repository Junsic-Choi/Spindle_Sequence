<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스핀들 작업 순서 관리</title>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #475569;
            --border-color: #E2E8F0;
            --completed-bg: #FEF08A;
            /* 노란색 배경 */
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header-title p {
            font-size: 15px;
            color: var(--text-muted);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .machine-select {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: white;
            font-size: 16px;
            color: var(--text-main);
            font-weight: 600;
            outline: none;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .machine-select:hover {
            border-color: var(--primary);
        }

        .machine-section {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .machine-header {
            background-color: #F1F5F9;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .machine-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .worker-name {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th {
            background-color: #F8FAFC;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-main);
            vertical-align: middle;
        }

        /* 첫번째, 마지막 컬럼 선 제거 */
        th:last-child,
        td:last-child {
            border-right: none;
        }

        tbody tr {
            transition: background-color 0.2s;
            background-color: #FFFFFF;
        }

        /* 드래그 앤 드롭 스타일 */
        tbody tr.draggable {
            cursor: grab;
        }

        tbody tr.draggable:active {
            cursor: grabbing;
        }

        tbody tr.dragging {
            opacity: 0.4;
            background-color: #EEF2FF !important;
        }

        .drag-handle {
            color: #9CA3AF;
            font-size: 18px;
            cursor: grab;
            margin-right: 8px;
            vertical-align: middle;
        }

        tbody tr:hover:not(.completed):not(.dragging) {
            background-color: #F8FAFC;
        }

        /* 완료된 항목 노란색 스타일 */
        tbody tr.completed {
            background-color: var(--completed-bg);
        }

        /* 컬럼 너비 비율 고정 */
        .col-seq {
            width: 60px;
        }

        .col-month {
            width: 80px;
        }

        .col-model {
            width: 180px;
        }

        .col-item-no {
            width: 11%;
        }

        .col-item-name {
            width: 18%;
            /* 품명 조금 더 줄임 */
        }

        .col-qty {
            width: 60px;
        }

        .col-note {
            width: 20%;
        }

        .col-actions {
            width: 210px;
        }

        .btn {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-complete {
            background-color: #10B981;
            color: white;
            margin-right: 6px;
        }

        .btn-complete:hover {
            background-color: #059669;
        }

        .btn-undo {
            background-color: #6B7280;
            color: white;
            margin-right: 6px;
        }

        .btn-undo:hover {
            background-color: #4B5563;
        }

        .btn-delete {
            background-color: white;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-delete:hover {
            background-color: #FEF2F2;
        }

        /* 텍스트 정렬 */
        .text-left {
            text-align: left;
        }

        /* 비고 인풋 스타일 */
        .note-input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }

        .note-input:hover,
        .note-input:focus {
            border-color: var(--border-color);
            background: white;
            outline: none;
        }

        /* 완료된 열 인풋 디자인 */
        .completed .note-input {
            background: transparent;
        }

        .add-form-container {
            padding: 16px 24px;
            background-color: #F8FAFC;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .add-input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
        }

        .add-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-add {
            background-color: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            text-align: right;
            background: #F8FAFC;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .master-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .master-item input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
        }

        .master-item input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-master {
            background-color: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .btn-master:hover {
            background-color: #F1F5F9;
        }

        .header-title {
            display: flex;
            align-items: center;
        }

        /* 엑셀/인쇄 버튼 스타일 */
        .header-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .btn-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-action:hover {
            background-color: #F8FAFC;
        }

        .btn-action.excel {
            color: #16A34A;
            border-color: #16A34A;
            background-color: #F0FDF4;
        }

        .btn-action.excel:hover {
            background-color: #DCFCE7;
        }

        .btn-action.print {
            color: #475569;
        }

        /* 인쇄 최적화 스타일 */
        @media print {
            body {
                padding: 0;
                background-color: white;
            }

            .header,
            .btn,
            .btn-master,
            .btn-action,
            .add-form-container,
            .modal-overlay,
            .drag-handle,
            .col-month,
            .col-note,
            .col-actions,
            .cell-month,
            .cell-note,
            .cell-actions {
                display: none !important;
            }

            .col-item-no {
                width: 25% !important;
            }

            .machine-section {
                box-shadow: none !important;
                border: 1px solid #000;
                margin-bottom: 20px;
                page-break-inside: avoid;
            }

            .machine-header {
                background-color: #f0f0f0 !important;
                border-bottom: 1px solid #000;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            th {
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            th,
            td {
                border-color: #000 !important;
                color: #000 !important;
            }

            /* 인풋 요소를 텍스트처럼 보이게 처리 */
            .note-input {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                color: #000 !important;
            }

            .completed {
                background-color: transparent !important;
            }

            #app {
                margin-top: 20px;
            }
        }

        /* 태블릿 모드 오버라이드 스타일 */
        body.tablet-view {
            padding: 20px 10px;
        }

        body.tablet-view .container {
            max-width: 100%;
        }

        body.tablet-view .header {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            padding: 15px;
            margin-bottom: 20px;
        }

        body.tablet-view .header-controls-wrapper {
            width: 100%;
        }

        body.tablet-view .header-controls {
            width: 100%;
            justify-content: space-between;
        }

        body.tablet-view .header-actions {
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }

        body.tablet-view .machine-header {
            padding: 20px;
        }

        body.tablet-view .machine-title {
            font-size: 22px;
        }

        body.tablet-view .worker-name {
            font-size: 20px;
        }

        body.tablet-view th,
        body.tablet-view td {
            padding: 18px 12px;
            font-size: 16px;
        }

        body.tablet-view .btn {
            padding: 12px 20px;
            font-size: 15px;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        body.tablet-view .note-input {
            font-size: 16px;
            padding: 10px;
        }

        body.tablet-view .add-form-container {
            padding: 20px;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }

        body.tablet-view .add-input {
            padding: 12px;
            font-size: 16px;
            width: 100% !important;
        }

        body.tablet-view .btn-add {
            padding: 15px;
            font-size: 16px;
            width: 100%;
        }

        /* 뷰 전환 버튼 스타일 */
        .view-toggle-btn {
            background-color: #6366F1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .view-toggle-btn:hover {
            background-color: #4F46E5;
            transform: translateY(-1px);
        }

        .view-toggle-btn.active {
            background-color: #F59E0B;
        }
    </style>
    <!-- ExcelJS & FileSaver for styled Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- XLSX for Excel Import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="header-title">
                <div>
                    <h1>스핀들 작업 순서 관리</h1>
                    <p>장비별 생산 순서 확인 및 완료/삭제 처리</p>
                </div>
            </div>
            <div class="header-controls-wrapper">
                <div class="header-controls">
                    <button id="viewToggle" class="view-toggle-btn" onclick="toggleViewMode()">
                        <span id="viewToggleIcon">📱</span> <span id="viewToggleText">태블릿 모드</span>
                    </button>
                    <button class="btn-master" onclick="openMasterModal()">⚙️ 장비 마스터</button>
                    <select id="machineFilter" class="machine-select" onchange="renderApp()">
                        <!-- JS에서 옵션 채움 -->
                    </select>
                </div>
                <div class="header-actions">
                    <button class="btn-action excel" onclick="exportToExcel()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        엑셀 추출
                    </button>
                    <button class="btn-action" style="color: #2563EB; border-color: #2563EB; background-color: #EFF6FF;"
                        onclick="importFromExcel()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        엑셀 업로드
                    </button>
                    <input type="file" id="excelUploadInput" style="display: none;" accept=".xlsx, .xls"
                        onchange="handleExcelUpload(event)">
                    <button class="btn-action print" onclick="window.print()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                            </path>
                        </svg>
                        인쇄 (Ctrl+P)
                    </button>
                </div>
            </div>
        </div>

        <!-- 컨텐츠 영역 -->
        <div id="app"></div>

    </div>

    <!-- 장비 마스터 모달 -->
    <div class="modal-overlay" id="masterModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 장비 마스터 관리</h2>
                <button class="btn-close" onclick="closeMasterModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; font-size: 14px; color: var(--text-muted);">
                    장비명과 작업자를 수정, 삭제하거나 새로운 장비를 하단에 추가할 수 있습니다.
                </p>
                <div id="masterList">
                    <!-- JS로 렌더링 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-undo" style="margin-right:0;" onclick="closeMasterModal()">닫기</button>
            </div>
        </div>
    </div>

            const noInput = document.getElementById(`add-no-${sIndex}`);
            const nameInput = document.getElementById(`add-name-${sIndex}`);
            const qtyInput = document.getElementById(`add-qty-${sIndex}`);

            if (!noInput.value.trim() && !nameInput.value.trim()) {
                alert("품번이나 품명 중 하나는 입력해주세요.");
                return;
            }

            const newItem = {
                id: appData[sIndex].machine + '_' + Date.now(),
                prodMonth: monthInput.value.trim(),
                model: modelInput.value.trim(),
                itemNo: noInput.value.trim(),
                itemName: nameInput.value.trim(),
                qty: qtyInput.value ? parseInt(qtyInput.value, 10) : 1,
                note: noteInput.value.trim(),
                completed: false
            };

            appData[sIndex].items.push(newItem);
            saveData();
            renderApp();

        // 엑셀에서 붙여넣기 기능
        window.bulkPaste = function (sIndex) {
            const clipboardText = prompt("엑셀에서 복사한 데이터를 여기에 붙여넣어주세요.\n(생산월 | 기종 | 품번 | 품명 | 수량 | 비고 순서)");
            if (!clipboardText) return;

            const lines = clipboardText.trim().split('\n');
            let addCount = 0;

            lines.forEach(line => {
                const cols = line.split('\t'); // 엑셀은 탭으로 구분됨
                if (cols.length >= 2) {
                    const newItem = {
                        id: appData[sIndex].machine + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        prodMonth: (cols[0] || "").trim(),
                        model: (cols[1] || "").trim(),
                        itemNo: (cols[2] || "").trim(),
                        itemName: (cols[3] || "").trim(),
                        qty: cols[4] ? parseInt(cols[4].replace(/,/g, ''), 10) || 1 : 1,
                        note: (cols[5] || "").trim(),
                        completed: false
                    };
                    appData[sIndex].items.push(newItem);
                    addCount++;
                }
            });

            if (addCount > 0) {
                saveData();
                renderApp();
                alert(`${addCount}개의 항목이 추가되었습니다.`);
            } else {
                alert("유효한 데이터를 찾지 못했습니다. 엑셀에서 범위를 선택해 복사 후 다시 시도해주세요.");
            }
        };

        // 드래그 앤 드롭 로직
        let dragSourceIndex = null;
        let dragSectionIndex = null;

        function addDragAndDropHandlers() {
            const rows = document.querySelectorAll('.draggable');

            rows.forEach(row => {
                row.addEventListener('dragstart', function (e) {
                    dragSourceIndex = parseInt(this.dataset.index, 10);
                    // 가장 가까운 .machine-section div를 찾아 장비 인덱스를 추출
                    const parentSection = this.closest('.machine-section');
                    const machineTitle = parentSection.querySelector('.machine-title').textContent.split(':')[0].trim();
                    dragSectionIndex = appData.findIndex(s => s.machine === machineTitle);

                    setTimeout(() => this.classList.add('dragging'), 0);
                    e.dataTransfer.effectAllowed = 'move';
                });

                row.addEventListener('dragover', function (e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';

                    const currentSectionTitle = this.closest('.machine-section').querySelector('.machine-title').textContent.split(':')[0].trim();
                    const currentSectionIndex = appData.findIndex(s => s.machine === currentSectionTitle);

                    // 다른 장비 간에는 이동 금지
                    if (currentSectionIndex !== dragSectionIndex) return;

                    const bounding = this.getBoundingClientRect();
                    const offset = e.clientY - bounding.top;

                    // 마우스 위치에 따라 위로 넣을지 아래로 넣을지 시각적 표시
                    if (offset > bounding.height / 2) {
                        this.style.borderBottom = '2px solid var(--primary)';
                        this.style.borderTop = '';
                    } else {
                        this.style.borderTop = '2px solid var(--primary)';
                        this.style.borderBottom = '';
                    }
                });

                row.addEventListener('dragleave', function () {
                    this.style.borderBottom = '';
                    this.style.borderTop = '';
                });

                row.addEventListener('dragend', function () {
                    this.classList.remove('dragging');
                    rows.forEach(r => {
                        r.style.borderBottom = '';
                        r.style.borderTop = '';
                    });
                });

                row.addEventListener('drop', function (e) {
                    e.preventDefault();
                    this.style.borderBottom = '';
                    this.style.borderTop = '';

                    const currentSectionTitle = this.closest('.machine-section').querySelector('.machine-title').textContent.split(':')[0].trim();
                    const currentSectionIndex = appData.findIndex(s => s.machine === currentSectionTitle);

                    // 다른 장비 간 이동 방지
                    if (currentSectionIndex !== dragSectionIndex || dragSourceIndex === null) return;

                    const dropTargetIndex = parseInt(this.dataset.index, 10);
                    const bounding = this.getBoundingClientRect();
                    const offset = e.clientY - bounding.top;

                    // 삽입될 최종 인덱스 계산
                    let insertIndex = dropTargetIndex;
                    if (offset > bounding.height / 2) {
                        insertIndex++;
                    }
                    if (dragSourceIndex < insertIndex) {
                        insertIndex--;
                    }

                    if (dragSourceIndex !== insertIndex) {
                        // 데이터 배열 위치 변경
                        const itemsArray = appData[dragSectionIndex].items;
                        const [movedItem] = itemsArray.splice(dragSourceIndex, 1);
                        itemsArray.splice(insertIndex, 0, movedItem);

                        saveData();
                        renderApp();
                    }
                });
            });
        }

                itemDiv.innerHTML = `
                    <input type="text" value="${section.machine}" onchange="updateMasterMachine(${index}, this.value)" placeholder="장비명 (예: S41I)">
                    <input type="text" value="${section.worker}" onchange="updateMasterWorker(${index}, this.value)" placeholder="작업자명 (예: 홍길동)">
                    <button class="btn btn-delete" onclick="deleteMasterItem(${index})">삭제</button>
                `;
                masterList.appendChild(itemDiv);
            });

            // 새 장비 추가 행
            const addDiv = document.createElement('div');
            addDiv.className = 'master-item';
            addDiv.style.marginTop = '16px';
            addDiv.style.borderTop = '1px dashed var(--border-color)';
            addDiv.style.paddingTop = '16px';
            addDiv.innerHTML = `
                <input type="text" id="newMasterMachine" placeholder="새 장비명">
                <input type="text" id="newMasterWorker" placeholder="새 작업자명">
                <button class="btn btn-complete" style="margin-right:0; width: 62px;" onclick="addMasterItem()">추가</button>
            `;
            masterList.appendChild(addDiv);
        }

        window.updateMasterMachine = function (index, newVal) {
            if (newVal.trim() === '') {
                alert('장비명을 입력해주세요.');
                renderMasterList();
                return;
            }
            appData[index].machine = newVal;
            afterMasterChange();
        };

        window.updateMasterWorker = function (index, newVal) {
            appData[index].worker = newVal;
            afterMasterChange();
        };

        window.deleteMasterItem = function (index) {
            if (confirm(`정말 "${appData[index].machine}" 장비를 삭제하시겠습니까? (하위 작업 내역도 모두 삭제됩니다)`)) {
                appData.splice(index, 1);
                afterMasterChange();
            }
        };

        window.addMasterItem = function () {
            const mInput = document.getElementById('newMasterMachine');
            const wInput = document.getElementById('newMasterWorker');
            if (mInput.value.trim() === '') {
                alert('새 장비명을 입력해주세요!');
                return;
            }

            appData.push({
                machine: mInput.value.trim(),
                worker: wInput.value.trim(),
                items: []
            });
            afterMasterChange();
        };

        function afterMasterChange() {
            saveData();
            initFilter(); // 드롭다운 항목 갱신
            renderApp();  // 메인 테이블 갱신
            renderMasterList(); // 모달 폼 갱신
        }

        // 엑셀 추출 기능 (스타일 포함 - ExcelJS 사용)
        window.exportToExcel = async function () {
            try {
                const selectedMachine = document.getElementById('machineFilter').value;
                const filteredData = selectedMachine === 'ALL'
                    ? appData
                    : appData.filter(section => section.machine === selectedMachine);

                if (filteredData.length === 0 || filteredData.every(s => s.items.length === 0)) {
                    alert("추출할 데이터가 없습니다.");
                    return;
                }

                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('작업목록');

                // 컬럼 정의 (너비 및 키)
                worksheet.columns = [
                    { header: '장비명', key: 'machine', width: 15 },
                    { header: '작업자', key: 'worker', width: 12 },
                    { header: '순서', key: 'seq', width: 8 },
                    { header: '생산월', key: 'prodMonth', width: 10 },
                    { header: '기종', key: 'model', width: 25 },
                    { header: '품번', key: 'itemNo', width: 22 },
                    { header: '품명', key: 'itemName', width: 30 },
                    { header: '수량', key: 'qty', width: 8 },
                    { header: '비고', key: 'note', width: 30 },
                    { header: '상태', key: 'status', width: 10 }
                ];

                // 헤더 스타일 적용
                const headerRow = worksheet.getRow(1);
                headerRow.height = 25;
                headerRow.eachCell((cell) => {
                    cell.fill = {
                        type: 'pattern',
                        pattern: 'solid',
                        fgColor: { argb: 'FF4F46E5' } // 인디고 배경
                    };
                    cell.font = {
                        color: { argb: 'FFFFFFFF' }, // 휜 글씨
                        bold: true,
                        size: 11
                    };
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = {
                        top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' }
                    };
                });

                // 데이터 행 추가
                let currentRowIdx = 2;
                filteredData.forEach(section => {
                    section.items.forEach((item, index) => {
                        const row = worksheet.addRow({
                            machine: section.machine,
                            worker: section.worker,
                            seq: index + 1,
                            prodMonth: item.prodMonth,
                            model: item.model,
                            itemNo: item.itemNo,
                            itemName: item.itemName,
                            qty: item.qty,
                            note: item.note,
                            status: item.completed ? '완료' : '진행중'
                        });

                        row.height = 20;

                        // 각 셀의 개별 스타일 지정 
                        row.eachCell((cell, colNumber) => {
                            cell.border = {
                                top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' }
                            };

                            // 가로 정렬 지정 (4, 5, 6, 7, 9열: 생산월, 기종, 품번, 품명, 비고는 좌측)
                            const isLeftAlign = [4, 5, 6, 7, 9].includes(colNumber);
                            cell.alignment = {
                                vertical: 'middle',
                                horizontal: isLeftAlign ? 'left' : 'center'
                            };

                            // 완료 상태일 때 노란색 배경
                            if (item.completed) {
                                cell.fill = {
                                    type: 'pattern',
                                    pattern: 'solid',
                                    fgColor: { argb: 'FFFEF08A' } // 노란색
                                };
                            }
                        });
                        currentRowIdx++;
                    });
                });

                // 파일 생성 및 다운로드 (FileSaver.js 활용)
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                const now = new Date();
                const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
                const fileName = selectedMachine === 'ALL'
                    ? `전체_작업목록_${dateStr}.xlsx`
                    : `${selectedMachine}_작업목록_${dateStr}.xlsx`;

                saveAs(blob, fileName);

            } catch (e) {
                console.error("Excel 저장 실패:", e);
                alert("엑셀 파일 생성 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            }
        };

        // 엑셀 업로드 핸들러
        window.importFromExcel = function () {
            document.getElementById('excelUploadInput').click();
        };

        window.handleExcelUpload = function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];

                // header: 1로 읽어서 배열 형태로 가져옴
                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (rows.length < 1) {
                    alert("데이터가 있는 엑셀 파일을 선택해주세요.");
                    return;
                }

                let addedCount = 0;
                let currentMachine = null;
                let currentSection = null;
                let colMap = { machine: -1, prodMonth: -1, model: -1, itemNo: -1, itemName: -1, qty: -1, note: -1 };
                let isTableStart = false;

                // 엑셀의 모든 행을 순환하며 데이터 추출
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;

                    // 행 데이터를 문자열로 변환하여 검색 용이하게 함
                    const rowText = row.join(" ");

                    // 1. 장비명 감지 
                    // 행 전체 텍스트에서 우리가 알고 있는 장비명이 포함되어 있는지 확인 (예: "F152: 박정호")
                    const foundMachine = appData.find(m => rowText.includes(m.machine));
                    if (foundMachine) {
                        currentMachine = foundMachine.machine;
                        currentSection = foundMachine;
                        // 새로운 장비를 발견하면 테이블 시작 상태를 초기화하고 헤더를 다시 찾도록 함
                        isTableStart = false;
                    }

                    // 2. 테이블 헤더 감지 (품번, 품명 등이 포함된 행)
                    if (row.includes('품번') || row.includes('품명')) {
                        colMap = {
                            machine: row.indexOf('장비명'),
                            prodMonth: row.indexOf('생산월'),
                            model: row.indexOf('기종'),
                            itemNo: row.indexOf('품번'),
                            itemName: row.indexOf('품명'),
                            qty: row.indexOf('수량'),
                            note: row.indexOf('비고')
                        };
                        isTableStart = true;
                        continue; // 헤더 행 자체는 데이터가 아니므로 통과
                    }

                    // 3. 데이터 행 처리
                    if (isTableStart && colMap.itemNo !== -1) {
                        const itemNo = String(row[colMap.itemNo] || "").trim();
                        // 품번이 없거나 '품번'이라는 글자면 데이터가 아닌 것으로 간주
                        if (!itemNo || itemNo === '품번') continue;

                        // 현재 행에서 장비명 추출 (컬럼에 있으면 우선 사용, 없으면 위에서 찾은 currentMachine 사용)
                        let machineName = (colMap.machine !== -1 && row[colMap.machine]) ? String(row[colMap.machine]).trim() : currentMachine;

                        if (!machineName) continue;

                        let section = appData.find(s => s.machine === machineName);
                        if (!section) {
                            // 리스트에 없는 장비일 경우 (새로 추가)
                            section = { machine: machineName, worker: "미지정", items: [] };
                            appData.push(section);
                        }

                        const itemName = String(row[colMap.itemName] || "").trim();
                        const qty = parseInt(row[colMap.qty], 10) || 0;
                        const model = colMap.model !== -1 ? String(row[colMap.model] || "").trim() : "";
                        const prodMonth = colMap.prodMonth !== -1 ? String(row[colMap.prodMonth] || "").trim() : "";
                        const note = colMap.note !== -1 ? String(row[colMap.note] || "").trim() : "";

                        // 중복 체크 (품번, 수량, 기종, 품명 기준)
                        const isDuplicate = section.items.some(item =>
                            item.itemNo === itemNo &&
                            item.itemName === itemName &&
                            item.qty === qty &&
                            item.model === model
                        );

                        if (!isDuplicate) {
                            section.items.push({
                                id: `${machineName}_${Date.now()}_${i}`,
                                prodMonth: prodMonth,
                                model: model,
                                itemNo: itemNo,
                                itemName: itemName,
                                qty: qty,
                                note: note,
                                completed: false
                            });
                            addedCount++;
                        }
                    }
                }

                if (addedCount > 0) {
                    saveData();
                    initFilter();
                    renderApp();
                    alert(`${addedCount}개의 새로운 항목이 추가되었습니다.`);
                } else {
                    alert("새로 추가할 항목이 없거나 액셀 형식을 인식하지 못했습니다.\n- 장비명이 정확한지 (예: S41I)\n- '품번' 혹은 '품명' 헤더가 있는지 확인해주세요.");
                }

                // 입력 초기화
                event.target.value = "";
            };
            reader.readAsArrayBuffer(file);
        };

        // --- 뷰 모드 전환 로직 ---
        function toggleViewMode() {
            const isTablet = document.body.classList.toggle('tablet-view');
            updateViewToggleUI(isTablet);
            localStorage.setItem('viewMode', isTablet ? 'tablet' : 'pc');
        }

        function updateViewToggleUI(isTablet) {
            const btn = document.getElementById('viewToggle');
            const icon = document.getElementById('viewToggleIcon');
            const text = document.getElementById('viewToggleText');

            if (isTablet) {
                btn.classList.add('active');
                icon.textContent = '💻';
                text.textContent = 'PC 모드로 전환';
            } else {
                btn.classList.remove('active');
                icon.textContent = '📱';
                text.textContent = '태블릿 모드 전환';
            }
        }

        function loadViewMode() {
            const savedMode = localStorage.getItem('viewMode');
            if (savedMode === 'tablet') {
                document.body.classList.add('tablet-view');
                updateViewToggleUI(true);
            }
        }

        // 초기 실행
        document.addEventListener('DOMContentLoaded', () => {
            loadViewMode();
            initFilter();
            renderApp();
        });

    </script>

</body>

</html>
